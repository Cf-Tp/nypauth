<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIEW CAMERA</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;letter-spacing:0px;word-spacing:0px}
        body{background:#000;color:#fff;font-family:'Courier New',monospace;min-height:100vh;display:flex;justify-content:flex-end;padding:20px}
        .container{width:45%;max-width:600px;background:#0a0a0a;border:1px solid #1a1a1a;padding:30px;min-height:100vh;text-align:right}
        .logo{font-size:24px;color:#00ff00;letter-spacing:0px;border-bottom:1px solid #1a1a1a;padding-bottom:15px;margin-bottom:20px}
        .video-container{background:#050505;border:1px solid #111;padding:10px;margin:15px 0;text-align:center}
        img{width:100%;max-height:450px;background:#000}
        .status-box{background:#050505;border:1px solid #111;padding:10px 15px;margin-bottom:15px;text-align:right}
        .status-box .label{color:#555;font-size:10px;letter-spacing:0px}
        .status-box .value{color:#00ff00;font-size:12px;letter-spacing:0px}
        .footer{text-align:right;border-top:1px solid #1a1a1a;padding-top:15px;margin-top:20px;font-size:9px;color:#222;letter-spacing:0px}
        .badge{display:inline-block;border:1px solid #1a1a1a;padding:2px 8px;font-size:8px;color:#333;letter-spacing:0px;margin-left:5px}
        .input-field{background:#000;border:1px solid #222;color:#fff;padding:8px 12px;font-family:'Courier New',monospace;font-size:11px;text-align:right;outline:none;width:100%;letter-spacing:0px;margin:5px 0}
        .input-field:focus{border-color:#00ff00}
        @media(max-width:768px){body{justify-content:center;padding:10px}.container{width:100%}}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">● VIEW CAMERA</div>
        
        <div class="status-box">
            <div class="label">STATUS</div>
            <div class="value" id="statusText">WAITING FOR CONNECTION...</div>
        </div>

        <div class="info-box" style="background:#050505;border:1px solid #111;padding:8px 12px;margin:10px 0;text-align:right">
            <div style="color:#555;font-size:9px;letter-spacing:0px">SERVER URL</div>
            <input type="text" class="input-field" id="serverUrl" placeholder="http://localhost:5000" value="http://localhost:5000">
        </div>

        <div class="video-container">
            <img id="cameraFrame" src="" alt="Camera feed">
        </div>

        <div class="status-box">
            <div class="label">SESSION</div>
            <div class="value" id="sessionId">---</div>
        </div>

        <div class="footer">
            <span class="badge">LIVE</span>
            <span class="badge">ENCRYPTED</span>
            <span class="badge">MOBILE</span>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        let socket = null;
        let SERVER_URL = '';

        function getServerUrl() {
            SERVER_URL = document.getElementById('serverUrl').value.trim() || 'http://localhost:5000';
            return SERVER_URL;
        }

        const sessionId = window.location.pathname.split('/').pop();
        if (!sessionId || sessionId === 'view.html') {
            document.getElementById('sessionId').textContent = 'NO SESSION';
        } else {
            document.getElementById('sessionId').textContent = sessionId;
        }

        function connectSocket() {
            const url = getServerUrl();
            socket = io(url);

            socket.on('connect', function() {
                document.getElementById('statusText').textContent = 'CONNECTED - WAITING FOR CAMERA';
                socket.emit('view_session', {session_id: sessionId});
            });

            socket.on('camera_online', function(data) {
                if(data.session_id === sessionId) {
                    document.getElementById('statusText').textContent = 'CAMERA ONLINE';
                }
            });

            socket.on('camera_offline', function(data) {
                if(data.session_id === sessionId) {
                    document.getElementById('statusText').textContent = 'CAMERA OFFLINE';
                }
            });

            socket.on('new_frame', function(data) {
                if(data.session_id === sessionId && data.frame) {
                    document.getElementById('cameraFrame').src = data.frame;
                    document.getElementById('statusText').textContent = '● LIVE';
                }
            });

            socket.on('disconnect', function() {
                document.getElementById('statusText').textContent = 'DISCONNECTED';
            });
        }

        setTimeout(connectSocket, 1000);
    </script>
</body>
</html>
